<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0e">
<meta name="format-detection" content="telephone=no">
<title>ChatStory — EP01 He's Just Busy</title>
<link rel="stylesheet" href="../../style.css?v=10">
<style>
  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #0a0a0e; }

  #app {
    display: flex !important;
    flex-direction: column !important;
    width: 100% !important;
    height: 100vh !important;
    max-width: 430px !important;
    margin: 0 auto !important;
    overflow: hidden !important;
    position: relative !important;
  }

  /* Status bar + header: fixed height, never shrink */
  #app .status-bar,
  #app .chat-header { flex-shrink: 0; }

  /* Feed: takes all remaining space, scrolls inside */
  #feed-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }

  /* Choice panel: fixed height at bottom, never shrink */
  #app #choice-panel { flex-shrink: 0; width: 100% !important; }
</style>
</head>
<body>
<div id="app">

  <!-- CHAT HEADER -->
  <div class="chat-header">
    <div class="ch-back" onclick="window.location='../../index.html'">‹</div>
    <div class="ch-avatar" id="ch-avatar">Z</div>
    <div class="ch-info">
      <div class="ch-name" id="ch-name">Zoe</div>
      <div class="ch-status">
        <span class="status-dot"></span>
        <span id="ch-status-text">online</span>
      </div>
    </div>
    <div class="ch-right">
      <svg class="prog-ring" viewBox="0 0 30 30">
        <circle class="ring-track" cx="15" cy="15" r="11"/>
        <circle class="ring-fill" id="ring-fill" cx="15" cy="15" r="11"
          stroke-dasharray="69.1" stroke-dashoffset="69.1"/>
      </svg>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
  </div>

  <!-- FEED SCROLL AREA -->
  <div id="feed-scroll">
    <div class="feed-tint" id="feed-tint"></div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- CTA — sits above the choice panel when episode ends -->
  <div id="cta">
    <button id="cta-btn" onclick="window.location='../ep02/index.html'">Go to the next episode</button>
    <div id="cta-sub">Bölüm 2</div>
  </div>

  <!-- CHOICE PANEL — always at bottom -->
  <div id="choice-panel">
    <div id="choice-panel-empty">
      <div class="send-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </div>
    </div>
    <div id="choice-options"></div>
  </div>

</div>

<!-- PAUSE -->
<div id="pause-pill">⏸ tap to continue</div>

<!-- EPISODE DATA -->
<script src="config.js"></script>
<script src="script.js"></script>
<script src="../../engine.js?v=6"></script>
<script>
  ChatStory.init(CONFIG, MESSAGES);
  ChatStory.start();
</script>

</body>
</html>
